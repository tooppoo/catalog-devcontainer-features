name: "CI - Test Features"

on:
  pull_request:
    paths:
      - ".github/workflows/devcontainer-feature.yml"
      - "src/git-kura/**"
      - "test/git-kura/**"
      - "test/test-utils/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Dev Container CLI
        run: npm install -g @devcontainers/cli

      - name: Test git-kura Feature
        run: devcontainer features test --features git-kura --skip-scenarios --base-image mcr.microsoft.com/devcontainers/base:ubuntu .
